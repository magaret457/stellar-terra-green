name: 🐛 Bug Report
description: Report a bug in SolarCert
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web (frontend)
        - API (backend)
        - Smart Contracts
        - Stellar integration
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Ubuntu 22.04
        - Node: v22.x
        - Browser: Chrome 120
